<div class="filter-bar">
  <span class="filter-label">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"></polygon>
    </svg>
    Filter by:
  </span>
  <div class="filter-options">
    <lib-ui-button [color]="activeFilter() === 'All' ? 'primary' : 'basic'" (clicked)="onSelectFilter('All')">All</lib-ui-button>
    <lib-ui-button [color]="activeFilter() === 'Open' ? 'primary' : 'basic'" (clicked)="onSelectFilter('Open')">Open</lib-ui-button>
    <lib-ui-button [color]="activeFilter() === 'Closed' ? 'primary' : 'basic'" (clicked)="onSelectFilter('Closed')">Closed</lib-ui-button>
  </div>
</div>
