<div class="dashboard-container">
  <div style="display: flex; justify-content: space-between; align-items: center;">
    <h2>Dashboard</h2>
    <a routerLink="/issues/create" style="padding: 10px 15px; background: #28a745; color: white; text-decoration: none; border-radius: 4px;">+ Create Issue</a>
  </div>
  
  <div class="metrics-grid">
    <div class="metric-card">
      <h3>Total Issues</h3>
      <div class="value">{{ issueStore.totalCount() }}</div>
    </div>
    
    <div class="metric-card alert">
      <h3>Needs Attention</h3>
      <div class="value">{{ issueStore.openCount() }}</div>
    </div>
  </div>
</div>
