<div class="feature-container">
  <div class="header-section">
    <h2>Manage Issues</h2>
  </div>

  <div class="filter-controls">
    <input 
      type="text" 
      [formControl]="searchControl" 
      placeholder="Search issues..." 
      class="search-input"
    />
    <lib-ui-issue-filters (filterChange)="filterIssues($event)"></lib-ui-issue-filters>
  </div>

  @if (issueStore.isLoading()) {
    <div style="padding: 40px; text-align: center; color: #64748b;">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="spin">
        <path d="M21 12a9 9 0 1 1-6.219-8.56"></path>
      </svg>
      <p>Fetching issues from server...</p>
    </div>
  } @else {
    <ul class="issue-list">
      @for (issue of filteredIssues(); track issue.id) {
        <lib-ui-issue-card [issue]="issue" (resolve)="resolveIssue($event)" (view)="viewIssue(issue.id)">
        </lib-ui-issue-card>
      } @empty {
        <div class="empty-state">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <circle cx="12" cy="12" r="10"></circle>
            <path d="M8 12h8"></path>
          </svg>
          <p>No issues found. Everything is great!</p>
        </div>
      }
    </ul>
  }
</div>
