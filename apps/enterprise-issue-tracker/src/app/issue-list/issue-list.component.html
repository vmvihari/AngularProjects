<h2>Current Issues</h2>
<ul>
  <!-- Note: We now call issues() because it is a Signal -->
  @for (issue of issues(); track issue.id) {
    <app-issue-card>
      <!-- Default slot: This text automatically goes into <ng-content> -->
      <strong>{{ issue.title }}</strong> 

      @if (issue.status === 'Open') {
        <span style="color: red; margin-left: 10px;">(Needs Attention)</span>
        
        <!-- Named slot: The 'actions' attribute targets <ng-content select="[actions]"> -->
        <!-- Emit the output event when clicked -->
        <button actions (click)="resolveIssue.emit(issue.id)" style="margin-left: 10px;">Resolve</button>
      }
    </app-issue-card>
  } @empty {
    <p>No issues found.</p>
  }
</ul>
